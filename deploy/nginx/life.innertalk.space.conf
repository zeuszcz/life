# life.innertalk.space — Life self-development game
# Next.js app (Docker, docker-compose.prod.yml) on 127.0.0.1:8092.
# Mirrors the existing vhost convention on this box (cf. game.innertalk.space):
#   port 80  -> ACME http-01 challenge (webroot) + redirect to HTTPS
#   port 443 -> TLS (Let's Encrypt) reverse proxy
# Install:
#   sudo cp deploy/nginx/life.innertalk.space.conf /etc/nginx/sites-available/life.innertalk.space
#   sudo ln -sf ../sites-available/life.innertalk.space /etc/nginx/sites-enabled/life.innertalk.space
#   sudo certbot certonly --webroot -w /var/www/certbot -d life.innertalk.space
#   sudo nginx -t && sudo nginx -s reload

server {
    listen 80;
    listen [::]:80;
    server_name life.innertalk.space;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name life.innertalk.space;

    ssl_certificate     /etc/letsencrypt/live/life.innertalk.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/life.innertalk.space/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8092;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
