# Full production stack: Postgres + Next.js app + Caddy (auto-HTTPS).
# On the server: copy .env.production.example -> .env, set AUTH_SECRET, then:
#   docker compose up -d --build

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-life}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-life}
      POSTGRES_DB: ${POSTGRES_DB:-life}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-life} -d ${POSTGRES_DB:-life}"]
      interval: 5s
      timeout: 5s
      retries: 12

  web:
    build:
      context: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-life}:${POSTGRES_PASSWORD:-life}@db:5432/${POSTGRES_DB:-life}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in .env}
      AUTH_URL: ${AUTH_URL:-https://life.innertalk.space}
      AUTH_TRUST_HOST: "true"
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-life.innertalk.space}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  pgdata:
  caddy_data:
  caddy_config:
